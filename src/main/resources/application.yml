spring:
  application:
    name: linkal-srv

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
#  ── MAIL (MailJet SMTP) ───────────────────────────────────────────────────────
  mail:
    host: in-v3.mailjet.com
    port: 587
    username: ${MAILJET_API_KEY}
    password: ${MAILJET_SECRET_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: in-v3.mailjet.com

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:linkal-dev-secret-key-must-be-at-least-32-chars!!}
  expiration-ms: 86400000   # 24 horas

---
# ══════════════════════════════════════════════════════════════════════
#  PERFIL: dev
# ══════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/linkaldb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    show-sql: true

server:
  port: 9090

logging:
  level:
    es.miw.tfm.linkal: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: TRACE


