spring:
  application:
    name: linkal-srv

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
#  ── MAIL (MailJet SMTP) ───────────────────────────────────────────────────────
  mail:
    host: in-v3.mailjet.com
    port: 587
    username: ${MAILJET_API_KEY}
    password: ${MAILJET_SECRET_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: in-v3.mailjet.com

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:linkal-dev-secret-key-must-be-at-least-32-chars!!}
  expiration-ms: 86400000   # 24 horas

---
# ══════════════════════════════════════════════════════════════════════
#  PERFIL: dev
# ══════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/linkaldb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    show-sql: true

server:
  port: 9090
---
# ══════════════════════════════════════════════════════════════════════
#  PERFIL: prod (AWS)
# ══════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

