name: CD

on:
  push:
    branches:
      - master

env:
  AWS_REGION: eu-south-2
  APPLICATION_NAME: linkal-srv
  ENVIRONMENT_NAME: Linkal-srv-env
  S3_BUCKET: elasticbeanstalk-eu-south-2-413816840503

jobs:
  cd:
    name: Build & Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-22.04

    steps:
      # 📥 Descargar código
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ☕ Configurar Java
      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 🏗️ Compilar aplicación
      - name: 🏗️ Build project
        run: mvn clean package -DskipTests

      # 🏷️ Obtener metadata del pom.xml
      - name: 🏷️ Extract Maven metadata
        run: |
          echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
          echo "ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)" >> $GITHUB_ENV

      # 📦 Crear paquete desplegable
      - name: 📦 Create deployment package
        run: |
          mkdir deploy

          # Copiar jar generado
          cp target/${ARTIFACT}-${VERSION}.jar deploy/application.jar

          # Crear Procfile para Elastic Beanstalk
          cat <<EOF > deploy/Procfile
          web: java -jar application.jar
          EOF

          # Comprimir deployment
          cd deploy
          zip -r deploy.zip .

      # 🔐 Configurar credenciales AWS
      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ☁️ Subir ZIP a S3
      - name: ☁️ Upload ZIP to S3
        run: |
          aws s3 cp deploy/deploy.zip \
          s3://${{ env.S3_BUCKET }}/app-${{ github.sha }}.zip

      # 🆕 Crear nueva versión Elastic Beanstalk
      - name: 🆕 Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.APPLICATION_NAME }}" \
            --version-label "app-${{ github.sha }}" \
            --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="app-${{ github.sha }}.zip"

      # 🚀 Desplegar nueva versión
      - name: 🚀 Deploy application
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ env.ENVIRONMENT_NAME }}" \
            --version-label "app-${{ github.sha }}"

      # ⏳ Esperar a que termine el deploy
      - name: ⏳ Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-name "${{ env.ENVIRONMENT_NAME }}"

      # ✅ Mostrar URL final
      - name: ✅ Deployment finished
        run: |
          aws elasticbeanstalk describe-environments \
            --environment-names "${{ env.ENVIRONMENT_NAME }}" \
            --query "Environments[0].CNAME"